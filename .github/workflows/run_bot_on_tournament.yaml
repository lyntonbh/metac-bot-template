name: Forecast on new AI tournament questions

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "tournament"
        type: choice
        options:
          - tournament
          - repredict_tournament
          - question_urls
      tournament_ids:
        description: "Comma-separated tournament slugs/IDs to forecast"
        required: true
        default: "summer-futureeval-2026"
      question_urls:
        description: "Comma-separated Metaculus question URLs for question_urls mode"
        required: false
        default: ""
  schedule:
    - cron: "*/20 * * * *" # runs every 20 minutes. Make sure to skip already forecasted questions!

# Add concurrency group to prevent parallel runs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false


# Daily job to run the simple forecast bot
jobs:
  forecast_job:
    runs-on: ubuntu-latest # determines the machine that will run the job - keep as is
    steps: # sets up the steps that will be run in order
      - name: Check tournament window
        id: tournament_window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            now="$(date -u +%s)"
            tournament_start="$(date -u -d '2026-05-18 00:00:00 UTC' +%s)"
            if [ "$now" -lt "$tournament_start" ]; then
              echo "Scheduled run skipped before Summer FutureEval starts."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"
      # setup repository with all necessary dependencies - keep as is
      - name: Check out repository
        if: steps.tournament_window.outputs.should_run == 'true'
        uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        if: steps.tournament_window.outputs.should_run == 'true'
        with:
          python-version: "3.11"
      - name: Check OpenRouter key budget
        if: steps.tournament_window.outputs.should_run == 'true'
        run: python scripts/check_openrouter_budget.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_BOT_TOKEN || secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MIN_CREDITS_REMAINING: "0.05"
      - name: Install poetry
        if: steps.tournament_window.outputs.should_run == 'true'
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      # Adding the below will make the workflow faster, but will mean you don't automatically get updates from forecasting-tools and other packages
      # - name: Load cached venv
      #   id: cached-poetry-dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: .venv
      #     key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        if: steps.tournament_window.outputs.should_run == 'true'
        run: poetry install --no-interaction --no-root
      - name: Run bot
        if: steps.tournament_window.outputs.should_run == 'true'
        run: |
          RUN_ARGS=()
          if [ "$RUN_MODE" = "question_urls" ]; then
            IFS=',' read -ra URLS <<< "$QUESTION_URLS"
            for url in "${URLS[@]}"; do
              trimmed="$(echo "$url" | xargs)"
              if [ -n "$trimmed" ]; then
                RUN_ARGS+=(--question-url "$trimmed")
              fi
            done
            if [ "${#RUN_ARGS[@]}" -eq 0 ]; then
              echo "question_urls mode requires at least one question URL." >&2
              exit 1
            fi
            RUN_ARGS+=(--continue-on-question-errors)
          else
            IFS=',' read -ra IDS <<< "$TOURNAMENT_IDS"
            for id in "${IDS[@]}"; do
              trimmed="$(echo "$id" | xargs)"
              if [ -n "$trimmed" ]; then
                RUN_ARGS+=(--tournament-id "$trimmed")
              fi
            done
          fi
          poetry run python main.py --mode "$RUN_MODE" "${RUN_ARGS[@]}"
        # this reads the environment variables from the github repository.
        # Store under Settings --> Secrets and variables --> Actions
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'tournament' }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_BOT_TOKEN || secrets.METACULUS_TOKEN }} # replace this with the name of the variable under which you stored your own Metaculus token
          TOURNAMENT_IDS: ${{ github.event.inputs.tournament_ids || 'summer-futureeval-2026' }}
          QUESTION_URLS: ${{ github.event.inputs.question_urls || '' }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_BOT_TOKEN || secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          EXPERIMENT_MODE: "off"
          ENABLE_EXPERIMENT_VARIANTS: "false"
          ALLOW_PUBLISH_EXPERIMENTS: "false"
          ENABLE_EXPERIMENT_LOGGING: "true"
          EXPERIMENT_LOG_DIR: "experiment_logs"
          RESEARCHER_MODEL: "all"
          RESEARCHER_RANDOM_MODELS: "asknews/news-summaries,perplexity,exa"
          RESEARCHER_FALLBACK_MODEL: "exa"
          ENABLE_SUPPLEMENTAL_WEB_RESEARCH: "true"
      - name: Upload forecast logs
        if: always() && steps.tournament_window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: experiment_logs/
          if-no-files-found: ignore
