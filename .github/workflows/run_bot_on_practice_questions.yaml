name: Forecast on MiniBench and benchmarking questions

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Practice target"
        required: true
        default: "minibench"
        type: choice
        options:
          - minibench
          - benchmarking_questions
          - learning
          - both
          - all
      practice:
        description: "Run without publishing to Metaculus"
        required: true
        default: false
        type: boolean
      max_questions:
        description: "Maximum questions per target; blank means no limit"
        required: false
        default: "3"
  schedule:
    - cron: "7,19,31,43,55 * * * *" # Avoid round-minute GitHub Actions cron congestion.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast_practice_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Run practice forecasts
        run: |
          PRACTICE_ARGS=()
          if [ "$PRACTICE_MODE" = "true" ]; then
            PRACTICE_ARGS+=(--practice)
          fi
          if [ -n "$MAX_QUESTIONS" ]; then
            PRACTICE_ARGS+=(--max-questions "$MAX_QUESTIONS")
            PRACTICE_ARGS+=(--question-shuffle-seed "$GITHUB_RUN_ID")
          fi

          if [ "$TARGET" = "both" ]; then
            MODES=("minibench" "benchmarking_questions")
          elif [ "$TARGET" = "all" ]; then
            MODES=("minibench" "benchmarking_questions" "learning")
          else
            MODES=("$TARGET")
          fi

          for mode in "${MODES[@]}"; do
            echo "Running practice forecast mode: $mode"
            if [ "$mode" = "learning" ]; then
              poetry run python main.py --mode tournament --tournament-id learning "${PRACTICE_ARGS[@]}"
            else
              poetry run python main.py --mode "$mode" "${PRACTICE_ARGS[@]}"
            fi
          done
        env:
          TARGET: ${{ github.event.inputs.target || 'minibench' }}
          PRACTICE_MODE: ${{ github.event.inputs.practice || 'false' }}
          MAX_QUESTIONS: ${{ github.event.inputs.max_questions || '' }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_BOT_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          EXPERIMENT_MODE: "off"
          FORECASTER_MAX_TOKENS: "4096"
          ESCALATION_MAX_TOKENS: "4096"
          DEEP_RESEARCH_MAX_TOKENS: "4096"
          ENABLE_EXPERIMENT_VARIANTS: "false"
          ALLOW_PUBLISH_EXPERIMENTS: "false"
          ENABLE_EXPERIMENT_LOGGING: "true"
          EXPERIMENT_LOG_DIR: "experiment_logs"
      - name: Publish practice forecast status
        if: always()
        run: |
          echo "## Practice forecast status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if compgen -G "experiment_logs/*/run_summary.md" > /dev/null; then
            for summary in experiment_logs/*/run_summary.md; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No run summary was produced. Check the preceding workflow logs for a setup or dependency failure." >> "$GITHUB_STEP_SUMMARY"
          fi

          if grep -R '"status": "forecasted"' experiment_logs >/dev/null 2>&1; then
            echo "::notice title=Forecasts returned::At least one practice run produced forecast reports."
          else
            echo "::notice title=No forecasts returned::The run completed, but no eligible questions were forecasted."
          fi

          if grep -R '"status": "errors"' experiment_logs >/dev/null 2>&1; then
            echo "::warning title=Forecast exceptions::At least one practice run returned exceptions."
          fi
      - name: Upload practice forecast logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: practice-forecast-logs-${{ github.run_id }}
          path: experiment_logs/
          if-no-files-found: ignore
