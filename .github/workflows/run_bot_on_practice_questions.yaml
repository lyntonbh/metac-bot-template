name: Forecast on MiniBench and benchmarking questions

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Practice target"
        required: true
        default: "minibench"
        type: choice
        options:
          - minibench
          - benchmarking_questions
          - both
      practice:
        description: "Run without publishing to Metaculus"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 */3 * * *" # MiniBench practice loop every 3 hours.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast_practice_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Run practice forecasts
        run: |
          PRACTICE_ARGS=()
          if [ "$PRACTICE_MODE" = "true" ]; then
            PRACTICE_ARGS+=(--practice)
          fi

          if [ "$TARGET" = "both" ]; then
            MODES=("minibench" "benchmarking_questions")
          else
            MODES=("$TARGET")
          fi

          for mode in "${MODES[@]}"; do
            echo "Running practice forecast mode: $mode"
            poetry run python main.py --mode "$mode" "${PRACTICE_ARGS[@]}"
          done
        env:
          TARGET: ${{ github.event.inputs.target || 'minibench' }}
          PRACTICE_MODE: ${{ github.event.inputs.practice || 'false' }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_BOT_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          EXPERIMENT_MODE: "off"
          ENABLE_EXPERIMENT_VARIANTS: "false"
          ALLOW_PUBLISH_EXPERIMENTS: "false"
          ENABLE_EXPERIMENT_LOGGING: "true"
          EXPERIMENT_LOG_DIR: "experiment_logs"
      - name: Upload practice forecast logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: practice-forecast-logs-${{ github.run_id }}
          path: experiment_logs/
          if-no-files-found: ignore
